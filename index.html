<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>George Adaptační Portál 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sporka-blue: #2870ED; --sporka-teal: #02A3A4; --sporka-apple: #0CB43F;
            --sporka-orange: #FF6130; --sporka-aubergine: #721C7A; --sporka-stone: #245375;
            --bg: #F8FAFC; --white: #ffffff; --radius: 16px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #1E293B; margin: 0; }

        /* HEADER & GAMIFIKACE */
        header { 
            background: linear-gradient(135deg, var(--sporka-stone) 0%, #1a3a52 100%); 
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            color: white; sticky: top; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .user-profile { display: flex; align-items: center; gap: 20px; }
        .avatar { width: 55px; height: 55px; background: var(--sporka-blue); border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; }
        
        .trophy-case { display: flex; gap: 12px; margin-top: 8px; }
        .trophy { width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: rgba(255,255,255,0.3); transition: 0.5s; }
        .trophy.active { color: #FFD700; background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,215,0,0.4); }

        /* CONTAINER & SIDEBAR */
        .container { max-width: 1440px; margin: 30px auto; padding: 0 25px; display: grid; grid-template-columns: 320px 1fr; gap: 40px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .month-box { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .month-header { padding: 12px 20px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #64748B; background: #F1F5F9; }
        
        .week-item { 
            display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; 
            text-decoration: none; color: #475569; font-weight: 600; transition: 0.3s; border-bottom: 1px solid #F1F5F9;
        }
        .week-item:hover { background: #F8FAFC; color: var(--sporka-blue); }
        .week-item.active { background: var(--sporka-blue); color: white; }
        .week-item.completed { background: #ECFDF5; color: var(--sporka-apple); border-left: 6px solid var(--sporka-apple); }

        /* CONTENT CARDS */
        .sexy-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #E2E8F0; transition: 0.3s; }
        .sexy-card:hover { transform: translateY(-5px); }
        .card-header { padding: 15px 20px; color: white; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 20px; }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }

        /* SPECIAL ELEMENTS */
        .video-hero { width: 100%; height: 250px; background: #000; border-radius: var(--radius); margin-bottom: 30px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-overlay { position: absolute; background: rgba(0,73,122,0.6); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .play-btn { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--sporka-blue); font-size: 1.5rem; cursor: pointer; }

        .map-hotspot { background: #F1F5F9; padding: 20px; border-radius: var(--radius); border: 2px dashed var(--sporka-blue); text-align: center; }

        /* THUMBS & SCOT */
        .manager-panel { grid-column: span 2; background: #F0F9FF; padding: 25px; border-radius: var(--radius); border-left: 8px solid var(--sporka-teal); }
        .thumbs-flex { display: flex; gap: 15px; margin-top: 20px; }
        .thumb-btn { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 2px solid #E2E8F0; text-align: center; cursor: pointer; transition: 0.3s; }
        .thumb-btn.active { border-color: var(--sporka-apple); background: #f0fff4; transform: scale(1.02); }
        .thumb-btn i { font-size: 1.8rem; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<header>
    <div class="user-profile">
        <div class="avatar">M</div>
        <div>
            <div style="font-size: 1.2rem; font-weight: 800;">Ahoj, Martine! 🚀</div>
            <div class="trophy-case">
                <div class="trophy" id="t-1" title="Měsíc 1: Úvěry"><i class="fas fa-award"></i></div>
                <div class="trophy" id="t-2" title="Měsíc 2: Pojištění"><i class="fas fa-shield-alt"></i></div>
                <div class="trophy" id="t-3" title="Měsíc 3: Investice"><i class="fas fa-chart-line"></i></div>
                <div class="trophy" id="t-4" title="Měsíc 4: Bankéř"><i class="fas fa-crown"></i></div>
            </div>
        </div>
    </div>
    <div style="text-align: right">
        <div style="font-size: 0.7rem; font-weight: 800; opacity: 0.8; margin-bottom: 5px;">TVŮJ PROGRES</div>
        <div style="width: 250px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
            <div id="p-bar" style="width: 5%; height: 100%; background: var(--sporka-teal); transition: 1s;"></div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar" id="sidebar"></aside>

    <main>
        <div class="video-hero">
            <div class="video-overlay">
                <div class="play-btn"><i class="fas fa-play"></i></div>
                <h3 style="margin-top: 15px;">Pozdrav od tvého týmu! 👋</h3>
            </div>
        </div>

        <div id="dynamic-content"></div>

        <div class="manager-panel" id="manager-section">
            <h3 style="margin-top: 0; color: var(--sporka-stone)">Manažerský sčot týdne</h3>
            <div class="grid-2" style="gap: 15px;">
                <div style="font-size: 0.85rem;"><strong>Co se naučím:</strong><ul id="scot-l"></ul></div>
                <div style="font-size: 0.85rem;"><strong>Na co se zaměřím:</strong><ul id="scot-p"></ul></div>
            </div>
            <div class="thumbs-flex">
                <div class="thumb-btn" onclick="checkCompletion(this)"><i class="fas fa-user-tie"></i><small>Manažer</small></div>
                <div class="thumb-btn" onclick="checkCompletion(this)"><i class="fas fa-graduation-cap"></i><small>Coach</small></div>
                <div class="thumb-btn" onclick="checkCompletion(this)"><i class="fas fa-user"></i><small>Martin</small></div>
            </div>
        </div>
    </main>
</div>

<script>
    const data = {
        1: { 
            title: "Vítej v České spořitelně", color: 'var(--sporka-blue)',
            scotL: ["Historie a vize banky", "George ekosystém"],
            scotP: ["První kontakt s klientem", "Choreo pobočky"],
            content: "První týden je o nasátí atmosféry. Podíváme se na mapu tvé pobočky a zjistíme, kde najdeš vše důležité."
        },
        2: { 
            title: "5* Servis a komunikace", color: 'var(--sporka-blue)',
            scotL: ["Standardy obsluhy", "Typologie klientů"],
            scotP: ["Aktivní naslouchání", "Zjišťování potřeb"],
            content: "Naučíš se, jak z každé návštěvy udělat pro klienta zážitek."
        }
    };

    function initSidebar() {
        const side = document.getElementById('sidebar');
        const months = ["Úvěry", "Pojištění", "Investice", "Finále"];
        const colors = ["var(--sporka-blue)", "var(--sporka-orange)", "var(--sporka-forest)", "var(--sporka-aubergine)"];
        let html = '';
        for(let m=0; m<4; m++) {
            html += `<div class="month-box"><div class="month-header">${m+1}. Měsíc: ${months[m]}</div>`;
            for(let w=1; w<=4; w++) {
                let wNum = (m*4)+w;
                html += `<a href="#" class="week-item" id="w-${wNum}" onclick="loadWeek(${wNum})">Týden ${wNum} <i class="fas fa-circle-check" style="opacity:0.2"></i></a>`;
            }
            html += `</div>`;
        }
        side.innerHTML = html;
    }

    function loadWeek(n) {
        document.querySelectorAll('.week-item').forEach(e => e.classList.remove('active'));
        document.getElementById(`w-${n}`).classList.add('active');
        
        const w = data[n] || { title: `Týden ${n}`, color: 'var(--sporka-stone)', scotL: ["Metodika"], scotP: ["Praxe"], content: "Pokračujeme v adaptaci..." };
        const prog = (n/16)*100;
        document.getElementById('p-bar').style.width = prog + '%';

        document.getElementById('dynamic-content').innerHTML = `
            <h1 style="color: var(--sporka-stone); margin-bottom: 5px;">${w.title}</h1>
            <p style="color: #64748B; margin-bottom: 25px;">${w.content}</p>
            
            <div class="grid-2" style="margin-bottom: 30px;">
                <div class="sexy-card">
                    <div class="card-header" style="background: linear-gradient(90deg, ${w.color}, var(--sporka-stone))"><i class="fas fa-map-marked-alt"></i> Mapa pobočky</div>
                    <div class="card-body">
                        <div class="map-hotspot">
                            <i class="fas fa-coffee fa-2x" style="color: var(--sporka-blue)"></i>
                            <p style="font-size: 0.8rem; margin-top: 10px;"><strong>Úkol:</strong> Najdi kávovar a nauč se dělat perfektní Cappuccino pro klienty.</p>
                        </div>
                    </div>
                </div>
                <div class="sexy-card">
                    <div class="card-header" style="background: linear-gradient(90deg, var(--sporka-teal), var(--sporka-stone))"><i class="fas fa-book-open"></i> Studijní materiály</div>
                    <div class="card-body">
                        <div style="font-size: 0.85rem;">• E-learning: Úvod do George<br>• Video: Jak mluvit s klientem</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('scot-l').innerHTML = w.scotL.map(i => `<li>${i}</li>`).join('');
        document.getElementById('scot-p').innerHTML = w.scotP.map(i => `<li>${i}</li>`).join('');
        
        // Reset palců pro nový týden (vizuálně)
        document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
    }

    function checkCompletion(el) {
        el.classList.toggle('active');
        const active = document.querySelectorAll('.thumb-btn.active').length;
        const currentW = document.querySelector('.week-item.active');
        
        if(active === 3) {
            currentW.classList.add('completed');
            currentW.querySelector('i').style.opacity = "1";
            checkMonthTrophy();
        } else {
            currentW.classList.remove('completed');
            currentW.querySelector('i').style.opacity = "0.2";
        }
    }

    function checkMonthTrophy() {
        for(let m=0; m<4; m++) {
            let monthDone = true;
            for(let w=1; w<=4; w++) {
                if(!document.getElementById(`w-${(m*4)+w}`).classList.contains('completed')) monthDone = false;
            }
            if(monthDone) document.getElementById(`t-${m+1}`).classList.add('active');
        }
    }

    initSidebar();
    loadWeek(1);
</script>
</body>
</html>
