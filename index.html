<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptační portál 2.0 | George Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --george-blue: #00497A;
            --george-light: #00A1DE;
            --m1-color: #f1c40f; /* Žlutá */
            --m2-color: #e67e22; /* Oranžová */
            --m3-color: #2ecc71; /* Zelená */
            --m4-color: #3498db; /* Modrá */
            --bg: #F2F5F7;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; margin: 0; scroll-behavior: smooth; }
        
        /* Header & Progress */
        header { 
            background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #D1D8DD; position: sticky; top: 0; z-index: 1000;
        }
        .progress-wrapper { display: flex; align-items: center; gap: 15px; }
        .bar-bg { width: 150px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--george-light); width: 18%; transition: 0.5s; }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 300px 1fr; gap: 30px; }

        /* Sidebar Navigation */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .month-card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border-top: 5px solid #ccc; }
        .month-title { padding: 12px 15px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #666; background: #fafafa; }
        .week-list { padding: 8px; }
        .week-item { 
            display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; 
            text-decoration: none; color: #444; font-size: 0.9rem; border-radius: 8px; margin-bottom: 4px; transition: 0.2s;
        }
        .week-item:hover { background: #f0f7ff; color: var(--george-blue); }
        .week-item.active { background: var(--george-blue); color: white; font-weight: 600; }
        .week-item.completed { border-left: 4px solid #2ecc71; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .week-item.active .status-dot { background: white; }
        .week-item.completed .status-dot { background: #2ecc71; }

        /* Main Content */
        .main-stage { display: flex; flex-direction: column; gap: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--white); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); }
        .card-h { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: 700; color: var(--george-blue); }
        
        /* Triáda & Special Cards */
        .triad-card { grid-column: span 2; background: linear-gradient(90deg, #00497A 0%, #00A1DE 100%); color: white; border: none; }
        .triad-card .card-h { color: white; }
        
        /* Buttons */
        .btn-blue { background: var(--george-blue); color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; display: block; text-align: center; text-decoration: none; }
        .btn-blue:hover { opacity: 0.9; }
        .note-box { background: #fff9db; padding: 12px; border-radius: 8px; font-size: 0.85rem; border-left: 4px solid #f1c40f; margin-top: 10px; }

        /* Manager Thumbs */
        .thumbs-row { display: flex; gap: 15px; margin-top: 15px; }
        .thumb-unit { flex: 1; padding: 15px; border-radius: 10px; background: #f8fafc; border: 1px solid #e2e8f0; text-align: center; cursor: pointer; }
        .thumb-unit.active { background: #ecfdf5; border-color: #10b981; color: #059669; }
        .thumb-unit i { font-size: 1.4rem; margin-bottom: 5px; }

        footer { background: var(--white); padding: 40px 5%; margin-top: 60px; border-top: 1px solid #ddd; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: var(--george-blue); font-size: 1.2rem;">ADAPTAČNÍ PORTÁL 2.0</div>
    <div class="progress-wrapper">
        <span style="font-size: 0.8rem; font-weight: 600;">CELKOVÝ PROGRES</span>
        <div class="bar-bg"><div id="main-progress" class="bar-fill"></div></div>
        <span id="progress-text" style="font-size: 0.8rem; font-weight: 700;">18%</span>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div id="sidebar-nav"></div>
    </aside>

    <main class="main-stage">
        <div id="dynamic-content">
            </div>

        <div class="card sub-section">
            <div class="card-h"><i class="fas fa-folder-open"></i> Knihovna dokumentů</div>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                <div style="text-align: center;"><i class="fas fa-file-pdf" style="color: #e74c3c; font-size: 2rem;"></i><br><small>Metodika Úvěry</small></div>
                <div style="text-align: center;"><i class="fas fa-file-pdf" style="color: #e74c3c; font-size: 2rem;"></i><br><small>Etický kodex</small></div>
                <div style="text-align: center;"><i class="fas fa-file-word" style="color: #3498db; font-size: 2rem;"></i><br><small>Pracovní sešit (Master)</small></div>
                <div style="text-align: center;"><i class="fas fa-file-excel" style="color: #27ae60; font-size: 2rem;"></i><br><small>Reporting</small></div>
            </div>
        </div>
    </main>
</div>

<footer id="footer-contacts">
    </footer>

<script>
    const weeksData = {
        1: { m: 1, title: "Vítejte v týmu", desc: "Orientace, systémy a první stínování.", hasSesit: true, hasTriada: true },
        2: { m: 1, title: "Komunikační standardy", desc: "Jak mluvit s klientem v George stylu.", hasSesit: true },
        3: { m: 1, title: "Práce s daty", desc: "Základy CRM a klientských karet.", hasSesit: false },
        4: { m: 1, title: "Základy produktů", desc: "Přehled portfolia pro nováčky.", hasSesit: false },
        5: { m: 2, title: "ČBA Úvěry I.", desc: "Metodika spotřebitelských úvěrů.", hasSesit: false },
        6: { m: 2, title: "ČBA Úvěry II.", desc: "Schvalovací proces a risk.", hasSesit: false },
        7: { m: 2, title: "Bydlení", desc: "Úvod do hypoték a zajištění.", hasSesit: false },
        8: { m: 2, title: "Pojištění k úvěrům", desc: "Ochrana schopnosti splácet.", hasSesit: false },
        9: { m: 3, title: "ČBA Investice", desc: "Fondy a investiční dotazník.", hasSesit: false },
        10: { m: 3, title: "Důchodové spoření", desc: "Příprava na stáří a penze.", hasSesit: false },
        11: { m: 3, title: "Pojištění majetku", desc: "Auta, domy a odpovědnost.", hasSesit: false },
        12: { m: 3, title: "Triáda - Vyhodnocení", desc: "Velké ověření dovedností.", hasSesit: false, hasTriada: true },
        13: { m: 4, title: "Future Banker 1.0", desc: "Příprava na závěrečnou zkoušku.", hasSesit: false },
        14: { m: 4, title: "Certifikační týden", desc: "Ostré testy a certifikace.", hasSesit: false },
        15: { m: 4, title: "Otevřená hodinka", desc: "Sdílení zkušeností s TL.", hasSesit: false },
        16: { m: 4, title: "Start Q2", desc: "Vstup do ostrého plánu 30%.", hasSesit: false }
    };

    function initSidebar() {
        const nav = document.getElementById('sidebar-nav');
        let html = '';
        const mColors = ['var(--m1-color)', 'var(--m2-color)', 'var(--m3-color)', 'var(--m4-color)'];
        
        for(let m=1; m<=4; m++) {
            html += `<div class="month-card" style="border-top-color: ${mColors[m-1]}">
                        <div class="month-title">Měsíc ${m}</div>
                        <div class="week-list">`;
            for(let w=1; w<=16; w++) {
                if(weeksData[w].m === m) {
                    html += `<a href="javascript:void(0)" onclick="loadWeek(${w})" id="w-btn-${w}" class="week-item ${w < 2 ? 'completed' : ''}">
                                <span>Týden ${w}</span>
                                <div class="status-dot"></div>
                             </a>`;
                }
            }
            html += `</div></div>`;
        }
        nav.innerHTML = html;
    }

    function loadWeek(num) {
        const week = weeksData[num];
        const content = document.getElementById('dynamic-content');
        
        // Update UI
        document.querySelectorAll('.week-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`w-btn-${num}`).classList.add('active');
        
        const progress = Math.round((num / 16) * 100);
        document.getElementById('main-progress').style.width = progress + '%';
        document.getElementById('progress-text').innerText = progress + '%';

        let triadHtml = week.hasTriada ? `
            <div class="card triad-card">
                <div class="card-h"><i class="fas fa-calendar-stars"></i> TRIÁDA SESSION - MILNÍK</div>
                <p>Tento týden tě čeká klíčová schůzka s manažerem a coachem. Zarezervuj si svůj slot v Outlooku.</p>
            </div>
        ` : '';

        let sesitHtml = week.hasSesit ? `
            <div class="card">
                <div class="card-h"><i class="fas fa-file-signature"></i> Pracovní sešit</div>
                <p style="font-size:0.85rem">Stáhni si podklady pro tento týden a vypracuj úkoly.</p>
                <a href="#" class="btn-blue"><i class="fas fa-download"></i> Stáhnout sešit</a>
                <div class="note-box"><strong>Tip:</strong> Po stažení si sešit ulož na svůj disk v pobočkové složce.</div>
            </div>
        ` : `
            <div class="card">
                <div class="card-h"><i class="fas fa-info-circle"></i> Pracovní sešit</div>
                <p style="font-size:0.85rem">Pokračuj v práci na svém sešitu, který jsi si stáhl v 1. nebo 2. týdnu.</p>
                <p style="font-size:0.8rem; color:#666">Nenacházíš ho? Najdeš ho v <strong>Knihovně dokumentů</strong> níže nebo v historii <strong>Týdne 1</strong>.</p>
            </div>
        `;

        content.innerHTML = `
            <div class="card" style="margin-bottom:20px; border-left: 5px solid var(--george-light)">
                <h2 style="margin:0; color:var(--george-blue)">Týden ${num}: ${week.title}</h2>
                <p style="color:#666">${week.desc}</p>
            </div>
            <div class="dashboard-grid">
                ${triadHtml}
                <div class="card">
                    <div class="card-h"><i class="fas fa-bullseye"></i> Co mě čeká</div>
                    <ul style="font-size:0.85rem; padding-left:20px">
                        <li>Samostudium metodiky</li>
                        <li>Stínování u seniorního kolegy</li>
                        <li>Příprava na certifikační test</li>
                    </ul>
                </div>
                <div class="card">
                    <div class="card-h"><i class="fas fa-graduation-cap"></i> Samostudium</div>
                    <div style="font-size:0.85rem">
                        <p><i class="fas fa-play-circle"></i> Video: George pro profíky</p>
                        <p><i class="fas fa-file-alt"></i> Metodický list č. ${num+10}</p>
                    </div>
                </div>
                ${sesitHtml}
                <div class="card">
                    <div class="card-h"><i class="fas fa-users-gear"></i> Manažerský panel</div>
                    <div class="thumbs-row">
                        <div class="thumb-unit" onclick="this.classList.toggle('active')"><i class="fas fa-user-tie"></i><br><small>Manager</small></div>
                        <div class="thumb-unit" onclick="this.classList.toggle('active')"><i class="fas fa-bullseye"></i><br><small>Coach</small></div>
                        <div class="thumb-unit" onclick="this.classList.toggle('active')"><i class="fas fa-university"></i><br><small>Bankéř</small></div>
                    </div>
                </div>
            </div>
        `;
    }

    // Footer generator
    const footer = document.getElementById('footer-contacts');
    footer.innerHTML = `
        <div><h4>Lektoři</h4><p>Jan Novák (Úvěry)<br>jana.m (Investice)</p></div>
        <div><h4>Podpora</h4><p>IT: 800 111 222<br>HR: adaptace@banka.cz</p></div>
        <div><h4>Užitečné</h4><a href="#">George Design</a><br><a href="#">FAQ</a></div>
    `;

    initSidebar();
    loadWeek(1);
</script>
</body>
</html>
