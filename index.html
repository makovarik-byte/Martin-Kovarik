<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Adaptační portál ČS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #2870ED; --stone: #245375; --teal: #02A3A4; --orange: #FF6130; --purple: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        
        header { background: var(--stone); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .layout { display: flex; gap: 30px; padding: 30px; max-width: 1600px; margin: auto; }
        nav { width: 300px; }
        
        .month-box { background: white; border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid #e2e8f0; }
        .month-head { padding: 15px; color: white; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; }
        
        main { flex-grow: 1; }
        .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border-top: 8px solid transparent; }
        .full { grid-column: span 2; }

        /* Konkrétní barvy dlaždic */
        .study { border-color: var(--blue); }
        .webinar { border-color: var(--purple); background: #fdfaff; }
        .prezence { border-color: var(--teal); background: #f7fffe; }
        .praxe { border-color: var(--orange); }

        .info-line { display: flex; margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .info-line b { width: 100px; color: #64748b; font-size: 0.8rem; }
        .info-line span { font-weight: 700; color: #1e293b; }

        .teams-link { 
            display: inline-flex; align-items: center; gap: 10px; background: #464EB8; color: white; 
            padding: 12px 20px; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 15px; transition: 0.3s;
        }
        .teams-link:hover { background: #3b42a0; transform: translateY(-2px); }

        .confirm-wrap { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .btn-confirm { 
            flex: 1; max-width: 250px; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0; 
            background: white; cursor: pointer; font-weight: 800; text-align: center; color: #64748b;
        }
        .btn-confirm.active { border-color: #22c55e; background: #f0fdf4; color: #166534; }
    </style>
</head>
<body>

<header><div style="font-weight:900;">ČS ADAPTAČNÍ PORTÁL</div></header>

<div class="layout">
    <nav id="menu"></nav>
    <main id="main-content"></main>
</div>

<script>
    const data = {
        1: {
            title: "1. týden: Start a systémy",
            study: ["E-learning Finanční gramotnost", "E-learning George", "Znalostní báze"],
            webinar: { cas: "Středa 10:00 - 11:30", misto: "MS Teams (online)", lektor: "Dana Modrá", link: "https://teams.microsoft.com" },
            prezence: { cas: "Čtvrtek 09:00 - 16:00", misto: "Centrála Praha, Budova A", lektor: "Jan Novák" },
            praxe: ["Nastavení PC a přístupů", "Choreo pobočky", "Představení týmu"]
        }
    };

    function loadWeek(n) {
        const w = data[n] || data[1];
        document.getElementById('main-content').innerHTML = `
            <h1 style="margin-bottom:30px;">${w.title}</h1>
            <div class="bento">
                <div class="card full study">
                    <h3><i class="fas fa-book"></i> Samostudium</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        ${w.study.map(s => `<div style="padding:10px; background:#f8fafc; border-radius:10px; font-weight:600;">• ${s}</div>`).join('')}
                    </div>
                </div>

                <div class="card webinar">
                    <h3><i class="fas fa-video" style="color:var(--purple)"></i> Ověřovací webinář</h3>
                    <div class="info-line"><b>ČAS:</b> <span>${w.webinar.cas}</span></div>
                    <div class="info-line"><b>MÍSTO:</b> <span>${w.webinar.misto}</span></div>
                    <div class="info-line"><b>LEKTOR:</b> <span>${w.webinar.lektor}</span></div>
                    <a href="${w.webinar.link}" class="teams-link"><i class="fab fa-microsoft"></i> PŘIPOJIT SE PŘES TEAMS</a>
                </div>

                <div class="card prezence">
                    <h3><i class="fas fa-users" style="color:var(--teal)"></i> Prezenční den</h3>
                    <div class="info-line"><b>ČAS:</b> <span>${w.prezence.cas}</span></div>
                    <div class="info-line"><b>MÍSTO:</b> <span>${w.prezence.misto}</span></div>
                    <div class="info-line"><b>LEKTOR:</b> <span>${w.prezence.lektor}</span></div>
                </div>

                <div class="card full praxe">
                    <h3><i class="fas fa-briefcase" style="color:var(--orange)"></i> Co si zkusit v praxi</h3>
                    <div style="display:flex; gap:15px;">
                        ${w.praxe.map(p => `<div style="padding:10px 20px; border:1px solid #fed7aa; border-radius:15px; font-weight:600;">${p}</div>`).join('')}
                    </div>
                </div>

                <div class="card full" style="text-align:center; background:none; box-shadow:none; border:none;">
                    <h3>Potvrzení týdne</h3>
                    <div class="confirm-wrap">
                        <div class="btn-confirm" onclick="this.classList.toggle('active')"><i class="fas fa-user-tie"></i><br>MANAŽER</div>
                        <div class="btn-confirm" onclick="this.classList.toggle('active')"><i class="fas fa-user-check"></i><br>MARTIN</div>
                    </div>
                </div>
            </div>
        `;
    }

    const months = ["ZÁKLADY", "ÚVĚRY", "POJIŠTĚNÍ", "INVESTICE"];
    const colors = ["var(--blue)", "var(--teal)", "var(--purple)", "var(--orange)"];
    const menu = document.getElementById('menu');
    
    months.forEach((m, i) => {
        const box = document.createElement('div');
        box.className = 'month-box';
        box.innerHTML = `<div class="month-head" style="background:${colors[i]}" onclick="alert('Přehled měsíce ${m}')">${i+1}. MĚSÍC: ${m}</div>
                         <div style="padding:10px;"><div style="cursor:pointer; padding:5px;" onclick="loadWeek(1)">Týden 1</div></div>`;
        menu.appendChild(box);
    });

    loadWeek(1);
</script>
</body>
</html>
