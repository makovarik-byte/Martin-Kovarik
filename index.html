<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Adaptační portál České spořitelny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --blue: #2870ED; --stone: #245375; --teal: #02A3A4; --orange: #FF6130; 
            --purple: #6c5ce7; --gold: #f1c40f; --bg: #f0f4f8; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--stone); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .progress-box { width: 200px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--teal); transition: 0.5s; }
        
        .layout { display: flex; gap: 25px; padding: 25px; max-width: 1550px; margin: auto; }
        nav { width: 320px; flex-shrink: 0; }
        
        .nav-btn { padding: 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; font-weight: bold; border: none; width: 100%; text-align: left; display: flex; align-items: center; gap: 10px; }
        .home-btn { background: var(--blue); color: white; }
        .cert-btn { background: var(--stone); color: white; border: 2px solid var(--gold); margin-top: 15px; }

        .month-group { background: white; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 15px; overflow: hidden; }
        .month-label { padding: 12px; font-size: 0.8rem; font-weight: 900; color: white; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; }
        .m1 { background: var(--blue); } .m2 { background: var(--teal); } .m3 { background: var(--purple); } .m4 { background: var(--orange); }
        
        .nav-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; transition: 0.3s; }
        .nav-item:hover { background: #f0f4f8; padding-left: 20px; }
        .nav-item.active { background: #eef2f7; border-left: 5px solid var(--blue); font-weight: bold; }

        main { flex-grow: 1; }
        .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e1e8ed; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .full { grid-column: span 2; }
        
        .pill { background: #f8f9fa; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .pill i { color: var(--blue); width: 20px; text-align: center; }
        
        .thumb { flex: 1; border: 2px solid #eee; padding: 15px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .thumb.on { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        
        .btn-start { background: var(--blue); color: white; padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .back-home { background: #eee; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <strong>Adaptační portál ČS</strong>
    <div class="progress-box"><div id="progress-bar"></div></div>
</header>

<div class="layout">
    <nav>
        <button class="nav-btn home-btn" onclick="showHome()"><i class="fas fa-home"></i> ÚVODNÍ STRANA</button>
        <div id="menu"></div>
        <button class="nav-btn cert-btn" onclick="showCert()"><i class="fas fa-medal"></i> CERTIFIKAČNÍ ZKOUŠKA</button>
    </nav>
    <main id="main-content"></main>
</div>

<script>
    const weekData = {
        1: {
            title: "1. týden: Příprava",
            know: ["Vize a hodnoty České spořitelny", "Znalostní báze - jak v ní hledat", "Základy finanční a digitální gramotnosti"],
            skills: ["Práce s hardwarem", "Orientace na pobočce"],
            do: ["Nastavení techniky", "Choreo pobočky", "Nastavení kalendáře"],
            study: [
                {t: "E-learning Finanční a digitální gramotnost", icon: "fa-graduation-cap"},
                {t: "E-learning George", icon: "fa-mobile-screen", tip: "Pokud máš George v mobilu, otevři si ho a zkoušej si orientaci přímo v něm."},
                {t: "E-learning Znalostka", icon: "fa-book", link: "https://znalostka.csas.cz"}
            ]
        },
        2: {
            title: "2. týden: Komunikace",
            know: ["Standardy 5* servisu", "Od servisu k poradenství"],
            skills: ["Navázání kontaktu", "Aktivní naslouchání"],
            do: ["První stínování", "Nácvik small talku"],
            study: [
                {t: "Index 1 - Doporučené minimum", icon: "fa-list-check"},
                {t: "Základy profi komunikace", icon: "fa-comments"},
                {t: "Od servisu k poradenství", icon: "fa-lightbulb"}
            ]
        }
    };

    const monthInfo = {
        1: { name: "ZÁKLADY", color: "var(--blue)", icon: "fa-rocket", focus: "Systémy, George a kultura ČS", training: "Vítejte v ČS", study: "Základní e-learningy, Znalostka", milestone: "Smlouva o adaptaci (Triáda)" },
        2: { name: "ÚVĚRY", color: "var(--teal)", icon: "fa-hand-holding-dollar", focus: "Spotřebitelské financování", training: "Úvěrový specialista", study: "Metodika úvěrů, Registry", milestone: "Zkouška ZOZ (Zákon o spotřebitelském úvěru)" },
        3: { name: "POJIŠTĚNÍ", color: "var(--purple)", icon: "fa-shield-heart", focus: "Životní a neživotní pojištění", training: "Pojišťovací poradce", study: "Produkty pojišťovny, IDD balíčky", milestone: "Zkouška dle IDD" },
        4: { name: "INVESTICE", color: "var(--orange)", icon: "fa-chart-line", focus: "Pravidelné investování a fondy", training: "Investiční akademie", study: "Investiční dotazník, ESG", milestone: "Certifikace u ČNB" }
    };

    function showHome() {
        document.getElementById('main-content').innerHTML = `
            <div class="card full" style="background:var(--stone); color:white;">
                <h1>Ahoj Martine! 👋</h1>
                <p>Vítej ve svém průvodci adaptací. Zde najdeš vše důležité pro tvůj rozvoj.</p>
            </div>
            <div class="bento" style="margin-top:20px;">
                <div class="card">
                    <h3><i class="fas fa-circle-info"></i> Jak portál používat?</h3>
                    <p>Vlevo najdeš týdenní plány. Kliknutím na <b>barevný název měsíce</b> uvidíš globální přehled (školení, zkoušky a cíle).</p>
                </div>
                <div class="card">
                    <h3><i class="fas fa-trophy"></i> Tvůj cíl</h3>
                    <p>Na konci 4. měsíce tě čeká <b>Certifikační zkouška</b>. Tento portál ti pomůže s přípravou. S podporou manažera a tvou aktivitou to zvládneš levou zadní!</p>
                </div>
                <div class="card">
                    <h3><i class="fas fa-phone"></i> Důležité kontakty</h3>
                    <div class="pill"><i class="fas fa-user-tie"></i> <b>Manažer:</b> Tvůj přímý nadřízený</div>
                    <div class="pill"><i class="fas fa-graduation-cap"></i> <b>Kouč:</b> Dana Modrá</div>
                    <div class="pill"><i class="fas fa-headset"></i> <b>IT Helpdesk:</b> 5555</div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-link"></i> Důležité odkazy</h3>
                    <div class="pill"><i class="fas fa-globe"></i> <a href="#" target="_blank">Intranet ČS</a></div>
                    <div class="pill"><i class="fas fa-laptop"></i> <a href="#" target="_blank">LMS Vzdělávání</a></div>
                    <div class="pill"><i class="fas fa-book-open"></i> <a href="#" target="_blank">Znalostní báze</a></div>
                </div>
            </div>
        `;
    }

    function showMonth(m) {
        const info = monthInfo[m];
        document.getElementById('main-content').innerHTML = `
            <div class="card full" style="background:${info.color}; color:white;">
                <h1><i class="fas ${info.icon}"></i> ${m}. MĚSÍC: ${info.name}</h1>
                <p>Globální přehled toho, co tě v tomto měsíci čeká.</p>
            </div>
            <div class="bento" style="margin-top:20px;">
                <div class="card"><h3><i class="fas fa-bullseye"></i> Co bych měl umět?</h3><p>${info.focus}</p></div>
                <div class="card"><h3><i class="fas fa-users"></i> Školení</h3><p>${info.training}</p></div>
                <div class="card"><h3><i class="fas fa-book"></i> Samostudium</h3><p>${info.study}</p></div>
                <div class="card" style="border: 3px solid ${info.color}"><h3><i class="fas fa-medal"></i> Klíčová zkouška / ZOZ</h3><p><b>${info.milestone}</b></p></div>
                <div class="card full" style="text-align:center;">
                    <button class="btn-start" style="background:${info.color}" onclick="loadWeek(${(m-1)*4 + 1})">Přejít na první týden měsíce</button>
                </div>
            </div>
        `;
    }

    function loadWeek(n) {
        const w = weekData[n] || { title: "Týden " + n, know: ["Bude doplněno"], skills: ["Bude doplněno"], do: ["Bude doplněno"], study: [] };
        document.getElementById('main-content').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2><i class="fas fa-calendar-day"></i> ${w.title}</h2>
                <div class="back-home" onclick="showHome()">ZPĚT NA ÚVOD</div>
            </div>
            <div class="bento">
                <div class="card full" style="border-top: 5px solid var(--orange)">
                    <h3><i class="fas fa-star" style="color:var(--orange)"></i> Cíle týdne</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div><strong>Znalosti:</strong><ul>${w.know.map(x=>`<li>${x}</li>`).join('')}</ul></div>
                        <div><strong>Dovednosti:</strong><ul>${w.skills.map(x=>`<li>${x}</li>`).join('')}</ul></div>
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-running"></i> V praxi</h3>
                    <ul>${w.do.map(x=>`<li>${x}</li>`).join('')}</ul>
                </div>
                <div class="card">
                    <h3><i class="fas fa-laptop"></i> Samostudium</h3>
                    <div style="font-size:0.9rem;">
                        ${w.study.map(s => `
                            <div style="margin-bottom:10px;">
                                <i class="fas ${s.icon}"></i> 
                                ${s.link ? `<a href="${s.link}" target="_blank" style="font-weight:bold; color:var(--blue); text-decoration:none;">${s.t}</a>` : `<b>${s.t}</b>`}
                                ${s.tip ? `<br><small style="color:#666; font-style:italic;">${s.tip}</small>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card full">
                    <h3 style="text-align:center">Potvrzení týdne</h3>
                    <div style="display:flex; gap:10px;">
                        <div class="thumb" onclick="this.classList.toggle('on')">MANAŽER</div>
                        <div class="thumb" onclick="this.classList.toggle('on')">KOUČ</div>
                        <div class="thumb" onclick="this.classList.toggle('on')">MARTIN</div>
                    </div>
                </div>
            </div>
        `;
    }

    function buildMenu() {
        const menu = document.getElementById('menu');
        const months = ["ZÁKLADY", "ÚVĚRY", "POJIŠTĚNÍ", "INVESTICE"];
        for(let m=0; m<4; m++) {
            const group = document.createElement('div');
            group.className = 'month-group';
            
            // TADY JE TA OPRAVA PROKLIKU:
            group.innerHTML = `<div class="month-label m${m+1}" onclick="showMonth(${m+1})">
                <span>${m+1}. MĚSÍC: ${months[m]}</span>
                <i class="fas fa-chevron-right"></i>
            </div>`;
            
            for(let w=1; w<=4; w++) {
                const wn = (m*4)+w;
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.innerText = 'Týden ' + wn;
                div.onclick = () => loadWeek(wn);
                group.appendChild(div);
            }
            menu.appendChild(group);
        }
    }

    function showCert() {
        document.getElementById('main-content').innerHTML = `
            <div class="card full" style="background:linear-gradient(135deg, var(--stone), #000); color:white; text-align:center; padding:50px;">
                <i class="fas fa-medal fa-4x" style="color:var(--gold); margin-bottom:20px;"></i>
                <h1>Certifikační zkouška</h1>
                <p>Velké finále tvé cesty adaptací.</p>
            </div>
            <div class="bento" style="margin-top:20px;">
                <div class="card"><h3><i class="fas fa-clipboard-list"></i> Co mě čeká?</h3><p>Teoretický test ze všech produktových oblastí a modelový rozhovor s klientem.</p></div>
                <div class="card"><h3><i class="fas fa-clock"></i> Datum a čas</h3><p>Dle domluvy s tvým manažerem (obvykle konec 16. týdne).</p></div>
                <div class="card full"><h3><i class="fas fa-location-dot"></i> Místo</h3><p>Regionální tréninkové centrum.</p></div>
            </div>
        `;
    }

    buildMenu();
    showHome();
</script>
</body>
</html>
