<script>
    const weeks = {
        1: {
            title: "1. týden: Příprava a orientace",
            know: ["Vize a hodnoty České spořitelny", "Znalostní báze - jak v ní hledat", "Základy finanční a digitální gramotnosti"],
            do: ["Nastavení techniky (tablet, notebook, mobil)", "Choreo pobočky (kde co je, jak se hýbat)", "Nastavení kalendáře a schůzek"],
            study: [
                {t: "E-learning: George", i: "fa-university"},
                {t: "E-learning: Znalostní báze", i: "fa-search"},
                {t: "E-learning: Finanční gramotnost", i: "fa-coins"},
                {t: "E-learning: Digi gramotnost", i: "fa-laptop"}
            ],
            webinar: {link: "#", time: "Středa 10:00", coach: "Dana Modrá (Business Coach)"},
            prezence: {name: "Vítejte v ČS", place: "Regionální centrála", time: "Čtvrtek 9:00", coach: "Lektor Onboardingu"},
            extra: ["Nastavení techniky (George, Outlook, Teams)", "Choreo pobočky - prohlídka zázemí", "Nastavení kalendáře (pravidelné sloty)"],
            triada: "Smlouva o adaptaci: Nastavení spolupráce mezi tebou, manažerem a koučem. Klíč k tvému úspěchu.",
            next: "Příští týden se podíváme na to, jak profesionálně komunikovat a jak udělat z běžného servisu skvělé poradenství."
        },
        2: {
            title: "2. týden: Profesionální komunikace",
            know: ["Standardy 5* servisu", "Psychologie small talku", "Metodika přesměrování (Referál)"],
            do: ["Zvládnutí small talku s reálným klientem", "Práce s informacemi z rozhovoru", "Správné přesměrování na specialistu"],
            study: [
                {t: "E-learning: Základy profi komunikace", i: "fa-comments"},
                {t: "E-learning: Od servisu k poradenství", i: "fa-chart-line"}
            ],
            webinar: {link: "#", time: "Středa 13:00", coach: "Dana Modrá (Business Coach)"},
            prezence: {name: "Základy komunikace + Standard rozhovoru", place: "Pobočka / Online", time: "Čtvrtek 9:00", coach: "Business Coach"},
            extra: ["Komunikace s klienty na hale", "Nácvik 5* servisu", "Umění správně přesměrovat klienta"],
            next: "Týden 3 bude patřit produktovému minimu a tvým prvním krůčkům v systémech."
        }
    };

    // ... zbytek generátoru pro 3-16 týden (aby tam zůstala data) ...
    for(let i=3; i<=16; i++) {
        weeks[i] = { title: `Týden ${i}`, know: ["V přípravě..."], do: ["V přípravě..."], study: [], webinar: {}, prezence: {}, extra: [], next: "" };
    }

    // UPDATED LOADWEEK FUNCTION
    function loadWeek(n) {
        active = n;
        document.querySelectorAll('.week-link').forEach(l => l.classList.remove('active'));
        document.getElementById('wl-'+n).classList.add('active');
        
        const w = weeks[n];
        
        // Video a Triáda jen v 1. týdnu
        document.getElementById('video-box').style.display = (n === 1) ? 'block' : 'none';
        
        // Dynamické zobrazení karty Triády
        const bento = document.querySelector('.bento-grid');
        let triadaCard = document.getElementById('triada-card');
        
        if (n === 1) {
            if (!triadaCard) {
                triadaCard = document.createElement('div');
                triadaCard.id = 'triada-card';
                triadaCard.className = 'card span-3';
                triadaCard.style.background = 'linear-gradient(135deg, #02A3A4 0%, #2870ED 100%)';
                triadaCard.style.color = 'white';
                bento.prepend(triadaCard);
            }
            triadaCard.innerHTML = `<div class="card-label" style="color:white; opacity:0.8;"><i class="fas fa-handshake"></i> I. Triáda (Smlouva o adaptaci)</div>
                                    <p style="margin:0; font-size:1rem; font-weight:700;">${w.triada}</p>`;
        } else if (triadaCard) {
            triadaCard.remove();
        }

        // Naplnění zbytku
        document.getElementById('s-know').innerHTML = w.know.map(x => `<li>${x}</li>`).join('');
        document.getElementById('s-do').innerHTML = w.do.map(x => `<li>${x}</li>`).join('');
        document.getElementById('study-list').innerHTML = w.study.map(s => `<div class="study-item" style="background:rgba(40,112,237,0.05); border-radius:10px; padding:10px; margin-bottom:8px; font-size:0.85rem;"><i class="fas ${s.i}" style="color:var(--sporka-blue); margin-right:8px;"></i>${s.t}</div>`).join('');
        
        document.getElementById('webinar-detail').innerHTML = w.webinar.time ? `<strong>Lektor:</strong> ${w.webinar.coach}<br><strong>Čas:</strong> ${w.webinar.time}<br><a href="${w.webinar.link}" class="teams-btn" style="background:#464EB8; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; display:inline-block; margin-top:8px; font-weight:700;"><i class="fab fa-microsoft"></i> Do Teams</a>` : "Tento týden není webinář.";
        
        document.getElementById('prezence-detail').innerHTML = w.prezence.name ? `<strong>${w.prezence.name}</strong><br><i class="fas fa-map-marker-alt"></i> ${w.prezence.place}<br><i class="fas fa-clock"></i> ${w.prezence.time}<br><i class="fas fa-user"></i> ${w.prezence.coach}` : "Žádný prezenční den.";
        
        document.getElementById('extra-list').innerHTML = w.extra.map(e => `<div style="padding:10px; background:rgba(255,255,255,0.6); border-radius:10px; border: 1px solid var(--border);">• ${e}</div>`).join('');
        document.getElementById('next-week').innerText = w.next;

        // Sešit
        const action = document.getElementById('sesit-action');
        if(n === 1) {
            document.getElementById('sesit-text').innerText = "Stáhni si svůj hlavní pracovní sešit. Ulož si ho do tabletu a měj ho na každém setkání s koučem.";
            action.innerHTML = `<a href="#" class="teams-btn" style="background:var(--sporka-blue); color:white; padding:10px; border-radius:10px; text-decoration:none; display:block; text-align:center; font-weight:700;"><i class="fas fa-file-download"></i> Stáhnout PDF sešit</a>`;
        } else {
            document.getElementById('sesit-text').innerText = "Dnes pracujeme na stranách 12-20. Nezapomeň si zapsat reflexi z haly!";
            action.innerHTML = "";
        }

        // Palce
        const thumbs = document.querySelectorAll('.thumb');
        const saved = progress[n] || [false, false, false];
        thumbs.forEach((t, i) => t.classList.toggle('active', saved[i]));
    }

    // ... zbytek funkcí (init, hit, updateUI, toggleTheme) zůstává stejný ...
</script>
