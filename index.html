<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptační portál 2.0 | George Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Oficiální barvy ze vzorníku */
            --sporka-blue: #2870ED;
            --sporka-teal: #02A3A4;
            --sporka-forest: #028661;
            --sporka-apple: #0CB43F;
            --sporka-orange: #FF6130;
            --sporka-pink: #EB4C79;
            --sporka-aubergine: #721C7A;
            --sporka-stone: #245375;
            
            --bg: #F2F5F7;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; margin: 0; scroll-behavior: smooth; }
        
        /* Osobní Header */
        header { 
            background: var(--white); padding: 12px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #D1D8DD; position: sticky; top: 0; z-index: 1000;
        }
        .user-welcome { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; background: var(--sporka-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; }
        
        .progress-container { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .bar-bg { width: 220px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--sporka-blue); transition: 1s ease-in-out; width: 0%; }

        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; display: grid; grid-template-columns: 300px 1fr; gap: 30px; }

        /* Sidebar s fázemi */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .month-card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border-top: 5px solid #ccc; }
        .week-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; text-decoration: none; color: #444; font-size: 0.9rem; border-bottom: 1px solid #f8f8f8; transition: 0.2s; }
        .week-item:hover { background: #f0f7ff; }
        .week-item.active { background: var(--sporka-stone); color: white; font-weight: 600; }

        /* Hlavní plocha */
        .card { background: var(--white); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .card-h { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: 700; color: var(--sporka-stone); border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        /* Manažerský Sčot */
        .scot-area { background: #f0f9ff; border-radius: 10px; padding: 20px; border-left: 5px solid var(--sporka-teal); margin-top: 10px; }
        .scot-list { font-size: 0.85rem; line-height: 1.6; padding-left: 20px; }

        /* Organizační boxy */
        .info-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.85rem; margin: 10px 0; }
        .info-line { display: flex; align-items: center; gap: 10px; margin: 4px 0; }

        /* Interaktivní palce */
        .thumbs-row { display: flex; gap: 10px; margin-top: 15px; }
        .thumb { flex: 1; padding: 15px; border-radius: 8px; border: 2px solid #eee; text-align: center; cursor: pointer; transition: 0.3s; filter: grayscale(1); }
        .thumb.active { border-color: var(--sporka-apple); background: #f0fff4; filter: grayscale(0); transform: scale(1.05); }
        .thumb i { font-size: 1.5rem; margin-bottom: 5px; }

        /* Badge fází */
        .faze-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; color: white; text-transform: uppercase; margin-bottom: 10px; }

        .btn-teams { background: #464EB8; color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: block; text-align: center; font-weight: 600; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div class="user-welcome">
        <div class="user-avatar">M</div>
        <div>
            <div style="font-weight: 800; color: var(--sporka-stone); font-size: 1.1rem;">Vítej zpět, Martine! 👋</div>
            <div id="dynamic-status" style="font-size: 0.75rem; color: #64748b;">Dnes je tvůj 12. den adaptace ve fázi ČBA Úvěry.</div>
        </div>
    </div>
    <div class="progress-container">
        <span style="font-size: 0.7rem; font-weight: 800; color: var(--sporka-stone);">CELKOVÝ POKROK (4 MĚSÍCE)</span>
        <div class="bar-bg"><div id="main-progress" class="bar-fill"></div></div>
        <span id="percent-text" style="font-size: 0.75rem; font-weight: 800; color: var(--sporka-blue);">0%</span>
    </div>
</header>

<div class="container">
    <aside class="sidebar" id="sidebar-nav"></aside>

    <main>
        <div id="week-content"></div>
        
        <div class="card" id="manager-panel">
            <div class="card-h"><i class="fas fa-tasks"></i> Manažerský panel a potvrzení týdne</div>
            <div class="grid-2">
                <div class="scot-area">
                    <div style="font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; color: var(--sporka-stone);">CO MÁ BANKÉŘ UMĚT (SČOT)</div>
                    <ul class="scot-list" id="scot-learn"></ul>
                </div>
                <div class="scot-area" style="border-left-color: var(--sporka-orange); background: #fffcf0;">
                    <div style="font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; color: var(--sporka-stone);">NA CO SE ZAMĚŘIT V PRAXI</div>
                    <ul class="scot-list" id="scot-practice"></ul>
                </div>
            </div>
            <div class="thumbs-row">
                <div class="thumb" onclick="this.classList.toggle('active')"><i class="fas fa-user-tie"></i><br><small>Manažer</small></div>
                <div class="thumb" onclick="this.classList.toggle('active')"><i class="fas fa-graduation-cap"></i><br><small>Coach</small></div>
                <div class="thumb" onclick="this.classList.toggle('active')"><i class="fas fa-user"></i><br><small>Bankéř</small></div>
            </div>
        </div>

        <div class="card" style="border: 2px dashed #cbd5e1; background: none; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-size: 0.7rem; font-weight: 800; color: #64748b;">VÝHLED NA PŘÍŠTÍ TÝDEN</span>
                <div style="font-weight: 700; color: var(--sporka-stone);" id="next-week-title">...</div>
            </div>
            <i class="fas fa-arrow-right" style="color: #cbd5e1; font-size: 1.5rem;"></i>
        </div>
    </main>
</div>

<script>
    const weeksData = {
        1: { 
            m: 1, color: 'var(--sporka-blue)', badge: 'ADAPTACE', title: "Vítejte v týmu", 
            desc: "První krůčky, seznámení s týmem a nástroji.",
            cekame: "Stínování na pobočce, Triáda 1, aktivace George ID.",
            studium: "Index Digigram 1, Etický kodex, Bezpečnost v bance.",
            webinar: { cas: "Středa 9:00 - 10:30", lektor: "Petr Rychlý" },
            prezencni: { den: "Čtvrtek", misto: "Školící centrum Praha", lektor: "Jana Moudrá" },
            scotL: ["Struktura banky", "Základní terminologie", "George prostředí"],
            scotP: ["Uvítání klienta", "Obsluha kávovaru", "Small-talk standard"],
            next: "Týden 2: Základy servisu a 5* zážitek"
        },
        2: { 
            m: 1, color: 'var(--sporka-blue)', badge: 'ADAPTACE', title: "Základy servisu", 
            desc: "Jak děláme bankovnictví pro lidi.",
            cekame: "Příchozí klient, práce s pořadníkovým systémem.",
            studium: "Index Poradenství 1, Komunikační manuál.",
            webinar: { cas: "Úterý 14:00 - 15:30", lektor: "Igor Metodik" },
            prezencni: { den: "Pátek", misto: "Regionální hub", lektor: "Business Coach" },
            scotL: ["Typologie klientů", "Standardy obsluhy"],
            scotP: ["Zjišťování potřeb", "Práce s námitkami"],
            next: "Týden 3: Úvěry a spotřebitelské financování"
        }
        // ... sem pak dodáš další týdny
    };

    function init() {
        const nav = document.getElementById('sidebar-nav');
        let navHtml = '';
        const months = [
            { t: '1. Měsíc: Úvěry', c: 'var(--sporka-blue)' },
            { t: '2. Měsíc: Pojištění', c: 'var(--sporka-orange)' },
            { t: '3. Měsíc: Investice', c: 'var(--sporka-forest)' },
            { t: '4. Měsíc: Finále', c: 'var(--sporka-aubergine)' }
        ];

        months.forEach((m, idx) => {
            navHtml += `<div class="month-card" style="border-top-color: ${m.c}">
                <div style="padding:10px 15px; font-size:0.7rem; font-weight:800; color:#666; background:#fafafa;">${m.t}</div>`;
            for(let w=1; w<=4; w++) {
                let wNum = (idx*4)+w;
                navHtml += `<a href="javascript:void(0)" onclick="loadWeek(${wNum})" id="w-btn-${wNum}" class="week-item">
                    <span>Týden ${wNum}</span><i class="fas fa-check-circle" style="color:#eee"></i>
                </a>`;
            }
            navHtml += `</div>`;
        });
        nav.innerHTML = navHtml;
        loadWeek(1);
    }

    function loadWeek(n) {
        const w = weeksData[n] || weeksData[1];
        
        // Update UI
        document.querySelectorAll('.week-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`w-btn-${n}`).classList.add('active');
        
        const prog = Math.round((n/16)*100);
        document.getElementById('main-progress').style.width = prog + '%';
        document.getElementById('percent-text').innerText = prog + '%';

        // Update Content
        document.getElementById('week-content').innerHTML = `
            <div class="faze-badge" style="background:${w.color}">${w.badge}</div>
            <h1 style="margin: 0 0 10px 0; color:var(--sporka-stone)">Týden ${n}: ${w.title}</h1>
            <p style="color:#64748b; margin-bottom:25px;">${w.desc}</p>
            
            <div class="grid-2">
                <div class="card">
                    <div class="card-h"><i class="fas fa-bullseye"></i> Co mě čeká</div>
                    <p style="font-size:0.85rem;">${w.cekame}</p>
                    <div class="info-box">
                        <div class="info-line"><i class="fas fa-file-alt"></i> <strong>Pracovní sešit:</strong> Vyplnit do pátku</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-h"><i class="fas fa-graduation-cap"></i> Samostudium</div>
                    <p style="font-size:0.85rem;">${w.studium}</p>
                </div>
                <div class="card">
                    <div class="card-h"><i class="fas fa-desktop"></i> Ověřovací webinář</div>
                    <div class="info-box">
                        <div class="info-line"><i class="fas fa-clock"></i> <strong>Čas:</strong> ${w.webinar.cas}</div>
                        <div class="info-line"><i class="fas fa-user-tie"></i> <strong>Lektor:</strong> ${w.webinar.lektor}</div>
                    </div>
                    <a href="https://teams.microsoft.com" class="btn-teams"><i class="fab fa-microsoft"></i> Připojit se k Teams</a>
                </div>
                <div class="card">
                    <div class="card-h"><i class="fas fa-map-marker-alt"></i> Prezenční den</div>
                    <div class="info-box">
                        <div class="info-line"><i class="fas fa-calendar-alt"></i> <strong>Kdy:</strong> ${w.prezencni.den}</div>
                        <div class="info-line"><i class="fas fa-map-pin"></i> <strong>Kde:</strong> ${w.prezencni.misto}</div>
                    </div>
                </div>
            </div>
        `;

        // Update Scot and Next
        document.getElementById('scot-learn').innerHTML = w.scotL.map(i => `<li>${i}</li>`).join('');
        document.getElementById('scot-practice').innerHTML = w.scotP.map(i => `<li>${i}</li>`).join('');
        document.getElementById('next-week-title').innerText = w.next;
    }

    init();
</script>

</body>
</html>
