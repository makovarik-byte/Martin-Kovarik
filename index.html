<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Adaptační portál ČS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2870ED; --stone: #245375; --teal: #02A3A4; --orange: #FF6130; --bg: #f4f7f9; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--stone); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .progress-box { width: 250px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--teal); transition: 0.5s; }
        .layout { display: flex; gap: 25px; padding: 25px; max-width: 1450px; margin: auto; }
        nav { width: 280px; flex-shrink: 0; }
        .home-link { background: var(--blue); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(40,112,237,0.3); }
        .month-group { background: white; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; overflow: hidden; }
        .month-label { background: #f8f9fa; padding: 10px; font-size: 0.7rem; font-weight: 900; color: #888; border-bottom: 1px solid #eee; text-transform: uppercase; }
        .nav-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; font-weight: 600; display: flex; justify-content: space-between; }
        .nav-item:hover { background: #f0f7ff; }
        .nav-item.active { background: var(--stone); color: white; }
        .nav-item.done-check::after { content: '✔'; color: #4caf50; }
        main { flex-grow: 1; }
        .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 22px; border-radius: 18px; border: 1px solid #ddd; }
        .full { grid-column: span 2; }
        .triada { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; padding: 20px; border-radius: 18px; margin-bottom: 20px; }
        .info-btn { color: var(--blue); cursor: pointer; margin-left: 8px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 30px; border-radius: 20px; max-width: 450px; width: 90%; text-align: center; }
        .thumb { flex: 1; border: 1px solid #ddd; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 800; background: #fafafa; font-size: 0.7rem; }
        .thumb.on { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .btn { background: var(--blue); color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .back-btn { background: #eee; color: #666; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 8px; border: 1px solid #ddd; }
        .back-btn:hover { background: #e5e5e5; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="background:var(--blue); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:900;">M</div>
        <strong style="font-size: 1.2rem;">Adaptační portál ČS</strong>
    </div>
    <div class="progress-box"><div id="progress-bar"></div></div>
</header>

<div class="layout">
    <nav>
        <div class="home-link" id="home-btn" onclick="showHome()"><i class="fas fa-home"></i> ÚVODNÍ STRANA</div>
        <div id="menu"></div>
    </nav>

    <main id="main-content"></main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <i class="fas fa-info-circle fa-3x" style="color: var(--blue); margin-bottom: 15px;"></i>
        <h3 id="modal-title">Info</h3>
        <p id="modal-text"></p>
        <button class="btn" style="background:var(--stone); margin-top:20px;" onclick="closeModal()">Rozumím</button>
    </div>
</div>

<script>
    const infoDetails = {
        "Nastavení techniky": "Pomůže vám manager případně Helpdesk IT.",
        "Choreo pobočky": "Manažer ti představí pobočku, kolegy a jak vypadá denní rutina na pobočce.",
        "Nastavení kalendáře": "S manažerem si naplánujte do kalendáře bloky na vzdělávání, školení a praxi na pobočce."
    };

    const data = {
        1: {
            title: "1. týden: Příprava",
            know: ["Vize a hodnoty České spořitelny", "Znalostní báze - jak v ní hledat", "Základy finanční a digitální gramotnosti"],
            skills: ["Práce s hardwarem (PC, mobil, tiskárna)", "Orientace v prostorách pobočky"],
            do: ["Nastavení techniky", "Choreo pobočky", "Nastavení kalendáře"],
            study: ["E-learning: George Desktop", "E-learning: Bezpečnost", "Manuál: Choreo pobočky"],
            webinar: { time: "Středa 10:00", coach: "Dana Modrá", topic: "Úvod do systémů" },
            prezence: { title: "Vítejte v ČS", place: "Centrála / Region", time: "Čtvrtek 09:00 - 16:00" },
            next: "2. týden: Profesionální komunikace"
        },
        2: {
            title: "2. týden: Komunikace",
            know: ["Standardy 5* servisu", "Psychologie prodeje - základy"],
            skills: ["Navázání kontaktu s klientem", "Identifikace potřeb klienta"],
            do: ["První stínování u pokladny", "Nácvik small talku", "Práce s vyvolávacím systémem"],
            study: ["E-learning: 5* Servis", "Video: Komunikační typy"],
            webinar: { time: "Středa 13:00", coach: "Dana Modrá", topic: "Jak na 5* servis" },
            prezence: { title: "Komunikační trénink", place: "Regionální učebna", time: "Čtvrtek 09:00" },
            next: "3. týden: Produktové minimum"
        }
    };

    let activeView = 'home';
    let progress = {};

    function showHome() {
        activeView = 'home';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('home-btn').style.background = "var(--blue)";
        
        document.getElementById('main-content').innerHTML = `
            <div class="card full" style="background:var(--stone); color:white; margin-bottom:20px;">
                <h1 style="margin:0; font-size:2.2rem;">Vítej v týmu, Martine! 🚀</h1>
                <p style="opacity:0.9; font-size:1.1rem; margin-top:10px;">Adaptace v České spořitelně není sprint, je to cesta. Tento portál je tvým digitálním průvodcem, který tě během 16 týdnů promění v profesionálního bankéře.</p>
            </div>
            <div class="bento">
                <div class="card">
                    <h3 style="color:var(--blue)"><i class="fas fa-bullseye"></i> Co od tebe očekáváme?</h3>
                    <p style="font-size:0.9rem; line-height:1.6;">Tvým úkolem není jen sedět na školeních. Chceme, aby ses aktivně zajímal, ptal a zkoušel si věci v praxi. Tvůj progres sledujeme přes <b>"Potvrzení týdne"</b> – po každém týdnu si sedni s manažerem a koučem a společně odklikněte splněné body.</p>
                </div>
                <div class="card">
                    <h3 style="color:var(--teal)"><i class="fas fa-rocket"></i> Jak portál používat?</h3>
                    <p style="font-size:0.9rem; line-height:1.6;">V menu najdeš 16 týdnů rozdělených do měsíčních bloků. Každý týden obsahuje cíle (co se máš naučit), samostudium, termíny <b>Ověřovacích webinářů</b> a <b>Prezenčních dnů</b>. Položky s ikonou <i class="fas fa-info-circle" style="color:var(--blue)"></i> skrývají tipy do praxe.</p>
                </div>
                <div class="card full" style="border-left:8px solid var(--orange)">
                    <h3>💡 Důležité upozornění</h3>
                    <p>Bez splnění <b>Pracovního sešitu</b> a samostudia v LMS se nemůžeš účastnit Ověřovacích webinářů. Příprava je klíčem k tvému úspěchu. Držíme ti palce!</p>
                </div>
                <div class="card full" style="text-align:center; padding:40px;">
                    <button class="btn" onclick="loadWeek(1)" style="padding:15px 40px; font-size:1.2rem;">1. TÝDEN <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        `;
    }

    function loadWeek(n) {
        activeView = n;
        document.getElementById('home-btn').style.background = "var(--stone)";
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('menu-' + n).classList.add('active');

        const w = data[n] || { title: "Týden "+n, know:[], skills:[], do:[], study:[], next:"V přípravě" };

        document.getElementById('main-content').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:2rem; margin:0;">${w.title}</h2>
                <div class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> ZPĚT NA ÚVOD</div>
            </div>
            ${n === 1 ? `<div class="triada"><h3><i class="fas fa-handshake"></i> I. Triáda (Smlouva o adaptaci)</h3><p>Nastavení spolupráce: bankéř – manažer – kouč</p></div>` : ''}
            <div class="bento">
                <div class="card full" style="border-top:6px solid var(--orange)">
                    <h3><i class="fas fa-flag" style="color:var(--orange)"></i> Cíle týdne</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
                        <div><strong>Znalosti:</strong><ul style="font-size:0.9rem;">${w.know.map(x=>`<li>${x}</li>`).join('')}</ul></div>
                        <div><strong>Dovednosti:</strong><ul style="font-size:0.9rem;">${w.skills.map(x=>`<li>${x}</li>`).join('')}</ul></div>
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-running" style="color:var(--teal)"></i> V praxi (zaměř se na)</h3>
                    <ul style="list-style:none; padding:0; font-size:0.9rem;">
                        ${w.do.map(x=>`<li style="margin-bottom:10px;">• ${x} ${infoDetails[x] ? `<i class="fas fa-info-circle info-btn" onclick="openModal('${x}')"></i>` : ''}</li>`).join('')}
                    </ul>
                </div>
                <div class="card">
                    <h3><i class="fas fa-laptop" style="color:var(--blue)"></i> Samostudium (LMS)</h3>
                    <div style="font-size:0.85rem;">${w.study.map(x=>`<div><i class="fas fa-check"></i> ${x}</div>`).join('')}</div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-video" style="color:var(--teal)"></i> Ověřovací webinář</h3>
                    <div style="font-size:0.9rem;">
                        <strong>Téma:</strong> ${w.webinar?.topic || 'TBD'}<br>
                        <strong>Čas:</strong> ${w.webinar?.time || 'TBD'}<br>
                        <strong>Kouč:</strong> ${w.webinar?.coach || 'TBD'}
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-users" style="color:var(--stone)"></i> Prezenční den</h3>
                    <div style="font-size:0.9rem;">
                        <strong>Název:</strong> ${w.prezence?.title || 'TBD'}<br>
                        <strong>Místo:</strong> ${w.prezence?.place || 'TBD'}<br>
                        <strong>Čas:</strong> ${w.prezence?.time || 'TBD'}
                    </div>
                </div>
                <div class="card">
                    <h3>Potvrzení týdne</h3>
                    <div style="display:flex; gap:8px;">
                        <div class="thumb" id="t-0" onclick="toggleThumb(0)">MANAŽER</div>
                        <div class="thumb" id="t-1" onclick="toggleThumb(1)">KOUČ</div>
                        <div class="thumb" id="t-2" onclick="toggleThumb(2)">MARTIN</div>
                    </div>
                </div>
                <div class="card" style="background:var(--stone); color:white;">
                    <span style="font-size:0.7rem; opacity:0.6;">PŘÍŠTĚ</span><br><strong>${w.next}</strong>
                </div>
            </div>
        `;
        updateThumbs();
    }

    function buildMenu() {
        const menu = document.getElementById('menu');
        const months = ["ZÁKLADY", "ÚVĚRY", "POJIŠTĚNÍ", "INVESTICE"];
        for(let m=0; m<4; m++) {
            const group = document.createElement('div');
            group.className = 'month-group';
            group.innerHTML = `<div class="month-label">${m+1}. MĚSÍC: ${months[m]}</div>`;
            for(let w=1; w<=4; w++) {
                const wn = (m*4)+w;
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.id = 'menu-'+wn;
                div.innerText = 'Týden '+wn;
                div.onclick = () => loadWeek(wn);
                group.appendChild(div);
            }
            menu.appendChild(group);
        }
    }

    function toggleThumb(idx) {
        if(!progress[activeView]) progress[activeView] = [false, false, false];
        progress[activeView][idx] = !progress[activeView][idx];
        document.getElementById('menu-'+activeView).classList.toggle('done-check', progress[activeView].every(x=>x));
        updateThumbs();
        updateProgress();
    }

    function updateThumbs() {
        const state = progress[activeView] || [false, false, false];
        for(let i=0; i<3; i++) {
            const t = document.getElementById('t-'+i);
            if(t) t.className = state[i] ? 'thumb on' : 'thumb';
        }
    }

    function updateProgress() {
        let done = 0;
        for(let i=1; i<=16; i++) if(progress[i]?.every(x=>x)) done++;
        document.getElementById('progress-bar').style.width = (done/16*100)+'%';
    }

    function openModal(topic) {
        document.getElementById('modal-title').innerText = topic;
        document.getElementById('modal-text').innerText = infoDetails[topic];
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    buildMenu();
    showHome();
</script>
</body>
</html>
